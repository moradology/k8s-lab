# Tailscale-exposed services for UIs that run inside the cluster.
# Each becomes reachable at <hostname>.<tailnet>.ts.net once the
# tailscale-operator provisions a proxy pod.
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-ts
  namespace: argocd
  annotations:
    tailscale.com/hostname: argocd
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/instance: argo-cd
    app.kubernetes.io/name: argocd-server
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-ts
  namespace: monitoring
  annotations:
    tailscale.com/hostname: grafana
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/instance: kube-prom
    app.kubernetes.io/name: grafana
  ports:
  - port: 80
    targetPort: 3000
