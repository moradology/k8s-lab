apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: 1.80.0
    helm:
      # OAuth credentials are provided out-of-band via the
      # `operator-oauth` secret in the `tailscale` namespace. See
      # README "Manual steps after bootstrap".
      values: |
        oauth:
          existingSecret: operator-oauth
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
